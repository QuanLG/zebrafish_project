{% extends "base.html" %}

{% block title %}用户登录 - 斑马鱼分析系统{% endblock %}

{% block content %}
<div class="card" style="max-width: 450px; margin: 0 auto;">
    <h2>用户登录</h2>
    <p style="color: #666; margin-bottom: 20px;">请输入您的账号信息</p>
    
    <form id="loginForm">
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" required 
                   placeholder="请输入用户名">
        </div>
        
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" required 
                   placeholder="请输入密码">
        </div>
        
        <div id="messageBox" class="alert" style="display: none;"></div>
        
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button type="submit" class="btn" id="submitBtn">登录</button>
            <a href="{% url 'home' %}" class="btn btn-secondary">返回首页</a>
        </div>
    </form>
    
    <div style="margin-top: 20px; text-align: center; color: #666;">
        还没有账号？ <a href="{% url 'register' %}" style="color: #667eea;">立即注册</a>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const form = document.getElementById('loginForm');
const messageBox = document.getElementById('messageBox');
const submitBtn = document.getElementById('submitBtn');

function showMessage(msg, isError) {
    messageBox.textContent = msg;
    messageBox.style.display = 'block';
    messageBox.className = isError ? 'alert alert-error' : 'alert alert-success';
}

form.addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const formData = {
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
    };
    
    submitBtn.disabled = true;
    submitBtn.textContent = '登录中...';
    
    try {
        const response = await fetch('/api/users/login/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCSRFToken()
            },
            body: JSON.stringify(formData)
        });
        
        const data = await response.json();
        
        if (response.ok) {
            showMessage('登录成功！正在跳转...', false);
            const tokenData = data.data.tokens || data.data;
            localStorage.setItem('access_token', tokenData.access);
            localStorage.setItem('refresh_token', tokenData.refresh);
            localStorage.setItem('user_info', JSON.stringify(data.data.user || {}));
            const redirect = new URLSearchParams(window.location.search).get('next') || '/';
            setTimeout(() => {
                window.location.href = redirect;
            }, 1000);
        } else {
            let errorMsg = '登录失败：';
            if (data.errors) {
                const errors = Object.values(data.errors).flat();
                errorMsg += errors.join('；');
            } else if (data.detail) {
                errorMsg += data.detail;
            } else {
                errorMsg += data.message || '用户名或密码错误';
            }
            showMessage(errorMsg, true);
        }
    } catch (error) {
        showMessage('网络错误，请稍后重试', true);
    } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '登录';
    }
});

function getCSRFToken() {
    const cookies = document.cookie.split(';');
    for (let cookie of cookies) {
        const [name, value] = cookie.trim().split('=');
        if (name === 'csrftoken') return value;
    }
    return '';
}
</script>
{% endblock %}
